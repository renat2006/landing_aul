services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-aul-landing
    restart: unless-stopped
    ports:
      - "80:3000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - landing-network

networks:
  landing-network:
    driver: bridge

